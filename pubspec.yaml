name: rehlah_care
description: Rehlah - Arabic-first cancer companion app for UAE patients
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  google_fonts: 6.2.1
  shared_preferences: 2.5.3
  intl: 0.19.0
  cupertino_icons: ^1.0.8
  url_launcher: 6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
